<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Evolution — 量化AI进化系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;
  --red:#f85149;--yellow:#d2991d;--purple:#a371f7;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.navbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100}
.navbar .logo{font-size:18px;font-weight:700;color:var(--accent);margin-right:32px}
.navbar .logo span{color:var(--purple)}
.navbar nav{display:flex;gap:4px;flex:1}
.navbar nav button{background:none;border:none;color:var(--text2);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;transition:all .15s}
.navbar nav button:hover{background:var(--bg3);color:var(--text)}
.navbar nav button.active{background:var(--bg3);color:var(--accent);font-weight:600}
.navbar .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.navbar .status .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.navbar .status .dot.off{background:var(--red)}
.main{padding:24px}
.page{display:none}
.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;color:var(--accent);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 12px;background:var(--bg3);border-bottom:2px solid var(--border);color:var(--text2);font-weight:600;white-space:nowrap}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--bg3)}
.positive{color:var(--green)}.negative{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.metric-card{background:var(--bg3);border-radius:8px;padding:16px;text-align:center;border:1px solid var(--border)}
.metric-card .label{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.metric-card .value{font-size:22px;font-weight:700}
.chart-container{width:100%;height:400px;background:var(--bg3);border-radius:8px;overflow:hidden;position:relative}
.chart-container canvas{width:100%!important;height:100%!important}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:16px;color:var(--accent)}
.code-viewer{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:16px;max-height:400px;overflow:auto;font-family:'SF Mono',Monaco,monospace;font-size:12px;line-height:1.6;white-space:pre;color:var(--text)}
textarea,input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;outline:none}
textarea:focus,input:focus{border-color:var(--accent)}
.log-area{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;max-height:250px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.7;margin-top:12px}
.log-area .log-line{padding:2px 0}
.log-area .log-line.error{color:var(--red)}
.log-area .log-line.success{color:var(--green)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.tag-ok{background:rgba(63,185,80,.15);color:var(--green)}
.tag-err{background:rgba(248,81,73,.15);color:var(--red)}
@media(max-width:768px){.main{padding:12px}.metrics-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.navbar{padding:0 12px}.navbar nav button{padding:6px 10px;font-size:12px}}
</style>
</head>
<body>

<div id="demoBanner" style="display:none;background:var(--yellow);color:#0d1117;text-align:center;padding:10px 16px;font-size:13px;font-weight:500">
  ⚠️ GitHub Pages 演示模式 — 后端 API 未运行。请 <a href="https://github.com/peteryuyue001/petertest2" style="color:#0d1117;font-weight:700">克隆项目</a> 到本地启动完整功能（<code>uvicorn web.app:app</code>）
</div>
<div class="navbar">
  <div class="logo">🧬 Quant<span>Evolution</span></div>
  <nav>
    <button class="active" data-page="strategies">📋 策略池</button>
    <button data-page="backtest">🔬 回测</button>
    <button data-page="evolve">🧠 AI进化</button>
    <button data-page="comparison">📈 对比</button>
    <button data-page="system">⚙️ 系统</button>
  </nav>
  <div class="status" id="sysStatus"><div class="dot" id="statusDot"></div><span id="statusText">检查中...</span></div>
</div>

<div class="main">

  <div class="page active" id="page-strategies">
    <div class="card">
      <h3>📋 策略池</h3>
      <div style="overflow-x:auto">
        <table id="strategyTable">
          <thead><tr><th>版本</th><th>策略名称</th><th>总收益</th><th>年化收益</th><th>最大回撤</th><th>夏普</th><th>卡玛</th><th>胜率</th><th>操作</th></tr></thead>
          <tbody id="strategyTableBody"></tbody>
        </table>
      </div>
      <div id="strategyEmpty" style="text-align:center;padding:40px;color:var(--text2);display:none">📭 暂无策略，前往 <b>AI进化</b> 页面生成第一个策略</div>
    </div>
  </div>

  <div class="page" id="page-backtest">
    <div class="card">
      <h3>🔬 运行回测</h3>
      <div style="margin-bottom:16px">
        <label style="display:block;margin-bottom:8px;color:var(--text2);font-size:13px">选择要回测的策略版本（可多选）</label>
        <div id="backtestCheckboxes" style="display:flex;flex-wrap:wrap;gap:12px"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startBacktest()">▶ 一键回测</button>
        <button class="btn btn-success" onclick="startWSBacktest()">🔗 WebSocket 实时回测</button>
        <label style="color:var(--yellow);font-size:11px;margin-left:8px;align-self:center" id="wsModeHint"></label>
      </div>
      <div class="log-area" id="backtestLog" style="display:none"></div>
      <div id="backtestResult" style="margin-top:16px"></div>
    </div>
  </div>

  <div class="page" id="page-evolve">
    <div class="card">
      <h3>🧠 AI 生成新策略</h3>
      <textarea id="genInstruction" rows="3" placeholder="描述你想要的策略方向，例如：生成一个结合动量和低波动的沪深300选股策略"></textarea>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateStrategy()">✨ AI 生成</button>
        <span id="genStatus" style="align-self:center;color:var(--text2);font-size:13px"></span>
      </div>
      <div id="genResult" style="margin-top:16px"></div>
    </div>
    <div class="card">
      <h3>🔄 改进现有策略</h3>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <select id="improveVersion" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px"></select>
        <button class="btn btn-primary" onclick="improveStrategy()">🔬 AI 分析 & 改进</button>
        <span id="improveStatus" style="color:var(--text2);font-size:13px"></span>
      </div>
      <div id="improveResult" style="margin-top:16px"></div>
    </div>
  </div>

  <div class="page" id="page-comparison">
    <div class="card">
      <h3>📈 策略进化对比</h3>
      <div style="overflow-x:auto">
        <table id="comparisonTable">
          <thead><tr><th>版本</th><th>名称</th><th>总收益</th><th>年化收益</th><th>最大回撤</th><th>夏普</th><th>卡玛</th><th>信息比率</th></tr></thead>
          <tbody id="comparisonTableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h3>📊 指标走势</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px">
        <div class="chart-container" id="chartSharpe"><canvas id="canvasSharpe"></canvas></div>
        <div class="chart-container" id="chartReturn"><canvas id="canvasReturn"></canvas></div>
        <div class="chart-container" id="chartDD"><canvas id="canvasDD"></canvas></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-system">
    <div class="card"><h3>⚙️ 系统状态</h3><div id="systemInfo" style="display:grid;gap:12px"></div></div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">策略代码</h3>
    <div class="code-viewer" id="modalCode"></div>
    <div class="btn-group"><button class="btn" onclick="closeModal()">关闭</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const API = '/api';
let apiOnline = false;
let showDemoBanner = true;

// ── 检测 API 是否可用 ──
async function checkAPI() {
  try {
    const r = await fetch(API + '/status');
    apiOnline = r.ok;
  } catch(e) { apiOnline = false; }
  updateBanner();
}

function updateBanner() {
  const banner = document.getElementById('demoBanner');
  const cards = document.querySelectorAll('.api-required');
  if (!apiOnline) {
    if (banner) banner.style.display = 'block';
    cards.forEach(c => c.classList.add('demo-mode'));
  } else {
    if (banner) banner.style.display = 'none';
    cards.forEach(c => c.classList.remove('demo-mode'));
  }
}

function showDemoAlert() {
  alert('⚠️ 当前为 GitHub Pages 演示模式\n\n后端 API 未运行，请将项目克隆到本地启动：\n\n  cd quant_evolution\n  pip install -r requirements.txt\n  pip install -r web/requirements.txt\n  uvicorn web.app:app --port 8000\n\n然后访问 http://localhost:8000');
}

// ── 页面切换 ──
document.querySelectorAll('.navbar nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.navbar nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    loadPage(page);
  });
});

function openModal(title, code) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalCode').textContent = code;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function pct(v) { const val = typeof v === 'number' ? v : 0; const cls = val >= 0 ? 'positive' : 'negative'; return `<span class="${cls}">${(val*100).toFixed(2)}%</span>`; }
function num(v, d=2) { return (typeof v === 'number' ? v : 0).toFixed(d); }

function loadPage(page) {
  switch(page) {
    case 'strategies': loadStrategies(); break;
    case 'backtest': loadBacktestSelect(); break;
    case 'evolve': loadEvolveOptions(); break;
    case 'comparison': loadComparison(); break;
    case 'system': loadSystem(); break;
  }
}

async function checkStatus() {
  try {
    const r = await fetch(API + '/status');
    const d = await r.json();
    document.getElementById('statusText').textContent = `策略:${d.strategy_count} | 结果:${d.result_count} | LLM:${d.llm_available?'可用':'未配置'}`;
    document.getElementById('statusDot').className = 'dot' + (d.llm_available ? '' : ' off');
  } catch(e) { document.getElementById('statusText').textContent = 'API 未连接'; document.getElementById('statusDot').className = 'dot off'; }
}

// ============================================================
// 策略池
// ============================================================
async function loadStrategies() {
  try {
    const r = await fetch(API + '/strategies');
    const data = await r.json();
    const tbody = document.getElementById('strategyTableBody');
    const empty = document.getElementById('strategyEmpty');
    if (!data.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = data.map(s => `
      <tr>
        <td><strong>v${s.version}</strong></td><td>${s.strategy_name || '-'}</td>
        <td>${s.has_result ? pct(s.total_return) : '-'}</td>
        <td>${s.has_result ? pct(s.annual_return) : '-'}</td>
        <td>${s.has_result ? pct(s.max_drawdown) : '-'}</td>
        <td>${s.has_result ? num(s.sharpe_ratio) : '-'}</td>
        <td>${s.has_result ? num(s.calmar_ratio) : '-'}</td>
        <td>${s.has_result ? pct(s.win_rate) : '-'}</td>
        <td><button class="btn btn-sm" onclick="viewCode(${s.version})">📄 代码</button>
        <button class="btn btn-sm" onclick="deleteStrategy(${s.version})">🗑 删除</button></td>
      </tr>`).join('');
  } catch(e) { console.error(e); }
}

async function viewCode(version) {
  const r = await fetch(API + '/strategies/' + version);
  const d = await r.json();
  openModal(`策略 v${version} — 源代码`, d.code);
}

async function deleteStrategy(version) {
  if (!confirm(`确认删除策略 v${version} 及其回测结果？`)) return;
  const r = await fetch(API + '/strategies/' + version, { method: 'DELETE' });
  const d = await r.json();
  if (r.ok) { loadStrategies(); checkStatus(); } else { alert(d.detail); }
}

// ============================================================
// 回测
// ============================================================
async function loadBacktestSelect() {
  const r = await fetch(API + '/strategies');
  const data = await r.json();
  const container = document.getElementById('backtestCheckboxes');
  if (!data.length) { container.innerHTML = '<span style="color:var(--text2)">暂无策略</span>'; return; }
  container.innerHTML = data.map(s => `<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" value="${s.version}" class="bt-check"> v${s.version} <span style="color:var(--text2);font-size:11px">${s.strategy_name||''}</span></label>`).join('');
}

function getBacktestVersions() { return Array.from(document.querySelectorAll('.bt-check:checked')).map(cb => parseInt(cb.value)); }

async function startBacktest() {
  const versions = getBacktestVersions();
  if (!versions.length) { alert('请选择至少一个策略版本'); return; }
  const log = document.getElementById('backtestLog');
  const result = document.getElementById('backtestResult');
  log.style.display = 'block';
  log.innerHTML = '<div class="log-line">🚀 开始回测...</div>';
  result.innerHTML = '';
  const r = await fetch(API + '/backtest', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({versions}) });
  const d = await r.json();
  log.innerHTML += '<div class="log-line success">✅ 回测完成</div>';
  result.innerHTML = d.results.map(res => res.error ? `<div class="log-line error">v${res.version}: ${res.error}</div>` : `<div class="log-line success">v${res.version}: 夏普 ${num(res.sharpe_ratio)} | 总收益 ${pct(res.total_return)}</div>`).join('');
  checkStatus();
}

async function startWSBacktest() {
  const versions = getBacktestVersions();
  if (!versions.length) { alert('请选择至少一个策略版本'); return; }
  if (versions.length > 1) { alert('WebSocket 模式一次只支持一个策略'); return; }
  const version = versions[0];
  const log = document.getElementById('backtestLog');
  const result = document.getElementById('backtestResult');
  const hint = document.getElementById('wsModeHint');
  log.style.display = 'block';
  log.innerHTML = `<div class="log-line">🔗 正在连接 WebSocket 监控 v${version}...</div>`;
  result.innerHTML = '';
  hint.textContent = 'WebSocket 连接中...';
  const ws = new WebSocket(`ws://${location.host}/api/backtest/ws/${version}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'progress') { log.innerHTML += `<div class="log-line">${msg.message}</div>`; log.scrollTop = log.scrollHeight; }
    else if (msg.type === 'result') {
      hint.textContent = '';
      const m = msg.metrics;
      result.innerHTML = `<div class="card"><h3>📊 v${msg.version} 回测完成</h3><div class="metrics-grid"><div class="metric-card"><div class="label">总收益</div><div class="value">${pct(m.total_return)}</div></div><div class="metric-card"><div class="label">年化收益</div><div class="value">${pct(m.annual_return)}</div></div><div class="metric-card"><div class="label">最大回撤</div><div class="value">${pct(m.max_drawdown)}</div></div><div class="metric-card"><div class="label">夏普比率</div><div class="value">${num(m.sharpe_ratio)}</div></div><div class="metric-card"><div class="label">卡玛比率</div><div class="value">${num(m.calmar_ratio)}</div></div><div class="metric-card"><div class="label">胜率</div><div class="value">${pct(m.win_rate)}</div></div></div></div>`;
      if (msg.equity_curve && msg.equity_curve.length) setTimeout(() => drawEquityCurve(msg.equity_curve, msg.version), 100);
    } else if (msg.type === 'error') { hint.textContent = ''; log.innerHTML += `<div class="log-line error">❌ ${msg.message}</div>`; }
    else if (msg.type === 'completed') { log.innerHTML += '<div class="log-line success">✅ 回测流程结束</div>'; ws.close(); hint.textContent = '已完成'; checkStatus(); }
  };
  ws.onclose = () => { log.innerHTML += '<div class="log-line">🔌 连接关闭</div>'; hint.textContent = ''; };
  ws.onerror = () => { log.innerHTML += '<div class="log-line error">❌ WebSocket 连接失败</div>'; hint.textContent = '连接失败'; };
}

function drawEquityCurve(data, version) {
  const container = document.getElementById('backtestResult');
  const canvasId = 'equityCanvas_' + version;
  let canvas = document.getElementById(canvasId);
  if (!canvas) {
    const wrapper = document.createElement('div');
    wrapper.className = 'chart-container';
    wrapper.style.marginTop = '12px';
    canvas = document.createElement('canvas');
    canvas.id = canvasId;
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);
  }
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = 400;
  const w = canvas.width - 80, h = canvas.height - 60, ox = 60, oy = 20;
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = ox + (i / (data.length - 1)) * w;
    const y = oy + h - ((d.value - min) / range) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.fillStyle = '#c9d1d9'; ctx.font = '11px sans-serif';
  ctx.fillText(fmtNum(min), ox, oy + h + 15);
  ctx.fillText(fmtNum(max), ox, oy + 12);
}
function fmtNum(v) { return v >= 1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0); }

// ============================================================
// AI 进化
// ============================================================
async function loadEvolveOptions() {
  const r = await fetch(API + '/strategies');
  const data = await r.json();
  const sel = document.getElementById('improveVersion');
  sel.innerHTML = data.filter(s => s.has_result).map(s => `<option value="${s.version}">v${s.version} — ${s.strategy_name||''} (夏普:${num(s.sharpe_ratio)})</option>`).join('');
  if (!sel.innerHTML) sel.innerHTML = '<option>暂无已完成回测的策略</option>';
}

async function generateStrategy() {
  const instruction = document.getElementById('genInstruction').value.trim() || '生成一个沪深300多因子选股策略';
  const status = document.getElementById('genStatus');
  const result = document.getElementById('genResult');
  status.textContent = '⏳ AI 思考中...';
  result.innerHTML = '';
  const r = await fetch(API + '/evolve/generate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({instruction}) });
  const d = await r.json();
  if (r.ok) {
    status.textContent = '✅ 生成成功!';
    result.innerHTML = `<div class="log-line success">✅ 新策略已保存: ${d.filename}</div><div class="code-viewer" style="margin-top:8px;max-height:300px">${escapeHtml(d.code.substring(0,2000))}${d.code.length>2000?'\n... (截断)':''}</div>`;
    checkStatus();
  } else { status.textContent = '❌ 失败'; result.innerHTML = `<div class="log-line error">${escapeHtml(d.detail)}</div>`; }
}

async function improveStrategy() {
  const version = document.getElementById('improveVersion').value;
  if (!version || version === '暂无已完成回测的策略') return;
  const status = document.getElementById('improveStatus');
  const result = document.getElementById('improveResult');
  status.textContent = '⏳ AI 分析中...';
  result.innerHTML = '';
  const r = await fetch(API + '/evolve/improve/' + version, { method: 'POST' });
  const d = await r.json();
  if (r.ok) {
    status.textContent = '✅ 改进完成!';
    result.innerHTML = `<div class="log-line success">✅ 改进策略已保存: ${d.filename}</div><div class="code-viewer" style="margin-top:8px;max-height:300px">${escapeHtml(d.code.substring(0,2000))}${d.code.length>2000?'\n... (截断)':''}</div>`;
    checkStatus(); loadEvolveOptions();
  } else { status.textContent = '❌ 失败'; result.innerHTML = `<div class="log-line error">${escapeHtml(d.detail)}</div>`; }
}

function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ============================================================
// 对比
// ============================================================
async function loadComparison() {
  const r = await fetch(API + '/results/comparison');
  const data = await r.json();
  const tbody = document.getElementById('comparisonTableBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:40px">暂无回测对比数据</td></tr>'; return; }
  tbody.innerHTML = data.map(d => `<tr><td><strong>v${d.version}</strong></td><td>${d.name||'-'}</td><td>${pct(d.total_return)}</td><td>${pct(d.annual_return)}</td><td>${pct(d.max_drawdown)}</td><td>${num(d.sharpe_ratio)}</td><td>${num(d.calmar_ratio)}</td><td>${num(d.information_ratio)}</td></tr>`).join('');
  setTimeout(() => drawComparisonCharts(data), 200);
}

function drawComparisonCharts(data) {
  const labels = data.map(d => 'v'+d.version);
  const chartOpts = (title, color) => ({
    type: 'bar',
    data: { labels },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, title: { display: true, text: title, color: '#c9d1d9', font: { size: 14 } } }, scales: { x: { ticks: { color: '#8b949e' } }, y: { ticks: { color: '#8b949e' } } } }
  });
  destroyChart('canvasSharpe');
  destroyChart('canvasReturn');
  destroyChart('canvasDD');
  new Chart(document.getElementById('canvasSharpe'), { ...chartOpts('夏普比率', '#58a6ff'), data: { labels, datasets: [{ label: '夏普', data: data.map(d => d.sharpe_ratio), backgroundColor: '#58a6ff', borderRadius: 4 }] } });
  new Chart(document.getElementById('canvasReturn'), { ...chartOpts('年化收益 %', '#3fb950'), data: { labels, datasets: [{ label: '年化收益', data: data.map(d => (d.annual_return||0)*100), backgroundColor: '#3fb950', borderRadius: 4 }] } });
  new Chart(document.getElementById('canvasDD'), { ...chartOpts('最大回撤 %', '#f85149'), data: { labels, datasets: [{ label: '最大回撤', data: data.map(d => (d.max_drawdown||0)*100), backgroundColor: '#f85149', borderRadius: 4 }] } });
}
function destroyChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const instance = Chart.getChart(canvas);
  if (instance) instance.destroy();
}

// ============================================================
// 系统
// ============================================================
async function loadSystem() {
  const r = await fetch(API + '/status');
  const d = await r.json();
  document.getElementById('systemInfo').innerHTML = `
    <div class="card"><h3>📊 数据</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
      <div>策略文件: <strong>${d.strategy_count}</strong></div><div>回测结果: <strong>${d.result_count}</strong></div>
      <div>股票池: <strong>${d.stock_pool}</strong></div><div>日期范围: <strong>${d.date_range}</strong></div>
      <div>初始资金: <strong>${(d.initial_capital||0).toLocaleString()} 元</strong></div><div>LLM: <span class="tag ${d.llm_available?'tag-ok':'tag-err'}">${d.llm_available?'可用':'未配置'}</span></div>
    </div></div>`;
}

checkAPI().then(() => {
  checkStatus();
